<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBX LABS · Robux</title>
  <!-- Font Awesome for icons (same as FruitLabs) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter (same as FruitLabs) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: #0b0e14; /* same dark background */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      color: #eef3fc;
    }

    /* main container — exact same vibe, renamed */
    .slideshow-container {
      max-width: 600px;
      width: 100%;
      height: 90vh;
      max-height: 800px;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #16212e; /* FruitLabs dark blue-gray */
      border: 2px solid #ffb347; /* FruitLabs orange */
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
    }

    /* slides area */
    .slides-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* slide base */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #ffb347 #2f4a6a;
      padding: 1.5rem;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    /* scrollbar */
    .slide::-webkit-scrollbar {
      width: 8px;
    }
    .slide::-webkit-scrollbar-track {
      background: #2f4a6a;
      border-radius: 4px;
    }
    .slide::-webkit-scrollbar-thumb {
      background: #ffb347;
      border-radius: 4px;
    }

    /* --- first slide (welcome) --- */
    .first-slide-content {
      background: #16212e;
      border: 2px solid #ffb347;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 500px;
      margin: auto;
      text-align: center;
    }

    .first-slide-content h1 {
      color: white;
      font-size: 2.6rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #b0c8e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .first-slide-content h1 span {
      background: linear-gradient(135deg, #ffd966, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .first-slide-content p {
      color: #8fadc7;
      font-size: 1.1rem;
    }

    /* --- category header (robux options) --- */
    .category-header {
      text-align: center;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .category-header h2 {
      color: #ffd966;
      font-size: 2rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* robux grid — like fruit-grid but 3 columns? i'll do 2 for clarity but you can change */
    .robux-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 0.5rem 0 1.5rem 0;
    }

    .robux-card {
      background: #1f3142;
      border-radius: 16px;
      padding: 1.2rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 2px solid transparent;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .robux-card:hover {
      transform: translateY(-2px);
      border-color: #ffb347;
    }

    .robux-card.selected {
      border-color: #ffb347;
      background: #2a4058;
      box-shadow: 0 0 15px rgba(255, 180, 71, 0.3);
    }

    /* robux icon/logo */
    .robux-icon {
      width: 70px;
      height: 70px;
      background: #0f1a26;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.6rem;
      border: 2px solid #2f4a6a;
    }

    .robux-icon i {
      font-size: 2.2rem;
      color: #ffb347;
    }

    .robux-amount {
      color: #d0e2ff;
      font-size: 1.4rem;
      font-weight: 700;
      background: #0f1a26;
      width: 100%;
      padding: 0.4rem 0;
      border-radius: 30px;
      border: 1px solid #2f4a6a;
      pointer-events: none;
    }

    .robux-card.selected .robux-amount {
      background: #ffb347;
      color: #0b0e14;
      border-color: #ffb347;
    }

    /* selected count container */
    .selected-count-container {
      position: sticky;
      top: 0;
      background: #16212e;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      border: 1px solid #ffb347;
      margin-bottom: 1rem;
      display: inline-block;
      z-index: 10;
    }

    .selected-count-text {
      color: #ffb347;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .selected-count-number {
      background: #ffb347;
      color: #0b0e14;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      margin-left: 0.5rem;
      font-weight: 700;
    }

    /* last slide — username & confirm */
    .last-slide-content {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 1rem 0;
    }

    .last-slide-content .slide-header {
      text-align: center;
    }

    .last-slide-content .slide-header h1 {
      color: white;
      font-size: 2.6rem;
      font-weight: 700;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #b0c8e0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .last-slide-content .slide-header h1 span {
      background: linear-gradient(135deg, #ffd966, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .last-slide-content .slide-header p {
      color: #8fadc7;
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
      max-width: 300px;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #7a9bc2;
      font-size: 0.9rem;
    }

    #robloxUser {
      background: #0a121c;
      border: 1px solid #2f4a6a;
      border-radius: 40px;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      font-size: 0.95rem;
      width: 100%;
      color: white;
      outline: none;
    }

    #robloxUser:focus {
      border-color: #ffb347;
    }

    .confirm-btn {
      background: #ffb347;
      border: none;
      border-radius: 40px;
      padding: 0.7rem 2rem;
      font-weight: 600;
      font-size: 1rem;
      color: #0b0e14;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      margin-top: 1rem;
    }

    .confirm-btn:hover {
      background: #ffc46b;
      transform: scale(1.02);
    }

    /* navigation buttons */
    .nav-buttons-container {
      padding: 1rem 1.5rem;
      border-top: 2px solid #ffb347;
      background: #0f1a26;
      flex-shrink: 0;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .nav-btn {
      background: transparent;
      border: 2px solid #ffb347;
      border-radius: 40px;
      padding: 0.6rem 1.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffb347;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      flex: 1;
      justify-content: center;
    }

    .nav-btn:hover {
      background: #ffb347;
      color: #0b0e14;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* loading overlay — simplified but keeps orange/black theme */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-popup {
      background: #16212e;
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      border: 2px solid #ffb347;
      max-width: 400px;
      width: 90%;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #2f4a6a;
      border-top: 4px solid #ffb347;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-main-text {
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
      text-align: center;
      background: linear-gradient(135deg, #ffffff, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="slideshow-container">
    <!-- slides area -->
    <div class="slides-area">
      <!-- SLIDE 0: Intro / Welcome (like FruitLabs first slide) -->
      <div class="slide active" id="slide-0">
        <div class="first-slide-content">
          <h1>RBX<span>LABS</span></h1>
          <p style="margin-top: 1rem; font-size: 1.2rem;">pick your robux</p>
          <i class="fas fa-arrow-down" style="color: #ffb347; font-size: 2rem; margin-top: 2rem;"></i>
        </div>
      </div>

      <!-- SLIDE 1: Robux options (range 0-1000, 8 options) -->
      <div class="slide" id="slide-1">
        <div class="category-header">
          <h2>✨ choose amount</h2>
        </div>

        <!-- selected count indicator (mirrors fruit) -->
        <div class="selected-count-container" style="margin-left: auto; margin-right: auto; display: block; width: fit-content;">
          <span class="selected-count-text">ROBUX SELECTED</span>
          <span class="selected-count-number" id="selectedCount">0</span>
        </div>

        <!-- robux grid - 8 options between 0 and 1000 -->
        <div class="robux-grid" id="robuxGrid">
          <!-- will be filled by JS -->
        </div>
      </div>

      <!-- SLIDE 2: Username + confirm (like last slide) -->
      <div class="slide" id="slide-2">
        <div class="last-slide-content">
          <div class="slide-header">
            <h1>RBX<span>LABS</span></h1>
            <p>almost done</p>
          </div>

          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="robloxUser" placeholder="roblox username" autocomplete="off">
          </div>

          <button class="confirm-btn" id="confirmBtn">
            <i class="fas fa-check-circle"></i> confirm
          </button>
        </div>
      </div>
    </div>

    <!-- bottom navigation (exact same as fruit labs) -->
    <div class="nav-buttons-container">
      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> back</button>
        <button class="nav-btn" id="nextBtn">next <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </div>

  <!-- loading overlay (simplified but keeps aesthetic) -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-popup">
      <div class="loading-spinner"></div>
      <div class="loading-main-text">preparing robux...</div>
      <div style="color:#8fadc7; font-size:1rem;" id="loadingUsername"></div>
    </div>
  </div>

  <script>
    (function() {
      // --- define robux options: 8 options between 0 and 1000 ---
      const robuxOptions = [0, 50, 100, 200, 350, 500, 750, 1000];

      // state
      let currentSlide = 0;          // 0,1,2
      const slides = document.querySelectorAll('.slide');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      // selected robux (initially none, but we can set a default or null)
      let selectedRobux = null;       // store the amount
      const selectedCountSpan = document.getElementById('selectedCount');

      // robux grid element
      const robuxGrid = document.getElementById('robuxGrid');

      // --- render robux cards ---
      function renderRobuxCards() {
        if (!robuxGrid) return;
        let html = '';
        robuxOptions.forEach(amount => {
          const isSelected = (selectedRobux === amount);
          html += `
            <div class="robux-card ${isSelected ? 'selected' : ''}" data-amount="${amount}">
              <div class="robux-icon">
                <i class="fas fa-coins"></i>
              </div>
              <div class="robux-amount">${amount}</div>
            </div>
          `;
        });
        robuxGrid.innerHTML = html;

        // attach click listeners
        document.querySelectorAll('.robux-card').forEach(card => {
          card.addEventListener('click', () => {
            const amount = parseInt(card.dataset.amount, 10);
            // if same, we could deselect? but fruit style keeps selected one, we allow one selection
            if (selectedRobux === amount) {
              // optional: allow deselect? we'll keep it simple, can't deselect but you can pick another
              // but fruit allows toggling? actually fruit allows multiple selection? no, fruit labs is multiple fruits? 
              // but here we want single robux pick. I'll make it single-select: clicking a new one updates.
            }
            selectedRobux = amount;
            updateSelectedCount();
            renderRobuxCards(); // re-render to show selected class
          });
        });
      }

      // update the selected count display (mirrors fruit labs)
      function updateSelectedCount() {
        if (selectedCountSpan) {
          selectedCountSpan.innerText = selectedRobux !== null ? '1' : '0';
        }
      }

      // --- slide navigation functions ---
      function updateSlideVisibility() {
        slides.forEach((slide, index) => {
          if (index === currentSlide) {
            slide.classList.add('active');
          } else {
            slide.classList.remove('active');
          }
        });

        // prev/next buttons
        prevBtn.disabled = (currentSlide === 0);
        if (currentSlide === slides.length - 1) {
          nextBtn.innerHTML = `finish <i class="fas fa-check"></i>`;
        } else {
          nextBtn.innerHTML = `next <i class="fas fa-arrow-right"></i>`;
        }
      }

      // validation before moving forward
      function canGoNext() {
        if (currentSlide === 0) return true; // intro always can go next
        if (currentSlide === 1) {
          // must have selected a robux amount
          return selectedRobux !== null;
        }
        if (currentSlide === 2) {
          // last slide: need username (but we handle via confirm)
          return true; // we don't block next on last, because finish triggers confirm
        }
        return true;
      }

      // next action
      function handleNext() {
        if (currentSlide === slides.length - 1) {
          // on last slide: trigger confirm
          confirmOrder();
          return;
        }

        if (!canGoNext()) {
          alert('Please select a robux amount first.');
          return;
        }

        // move to next slide
        if (currentSlide < slides.length - 1) {
          currentSlide++;
          updateSlideVisibility();
        }
      }

      // prev action
      function handlePrev() {
        if (currentSlide > 0) {
          currentSlide--;
          updateSlideVisibility();
        }
      }

      // confirm (shows loading overlay)
      function confirmOrder() {
        const usernameInput = document.getElementById('robloxUser');
        const username = usernameInput.value.trim();
        if (!username) {
          alert('Please enter your Roblox username.');
          return;
        }
        if (selectedRobux === null) {
          // fallback: if somehow they get here without selection, go back
          alert('Please select a robux amount on the previous page.');
          currentSlide = 1;
          updateSlideVisibility();
          return;
        }

        // show loading overlay
        const overlay = document.getElementById('loadingOverlay');
        const loadingUsernameSpan = document.getElementById('loadingUsername');
        if (loadingUsernameSpan) {
          loadingUsernameSpan.innerText = `@${username} · ${selectedRobux} robux`;
        }
        overlay.classList.add('active');

        // simulate preparation (like fruit labs had)
        setTimeout(() => {
          overlay.classList.remove('active');
          alert(`Prepared ${selectedRobux} Robux for ${username} (demo)`);
          // you could reset or stay
        }, 2500);
      }

      // --- initialize ---
      renderRobuxCards();
      updateSelectedCount();
      updateSlideVisibility();

      // button listeners
      prevBtn.addEventListener('click', handlePrev);
      nextBtn.addEventListener('click', handleNext);

      // optional: if user presses enter on username field, trigger confirm
      document.getElementById('robloxUser')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          confirmOrder();
        }
      });
    })();
  </script>
</body>
</html>
